name: Build APK Android

on:
  push:
    branches: [ main ]
  workflow_dispatch:        # permet de lancer manuellement depuis GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      # 1. Récupérer le code
      - name: Checkout du code
        uses: actions/checkout@v4

      # 2. Installer Node.js
      - name: Installer Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. Installer Java (requis pour Android)
      - name: Installer Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 4. Installer les dépendances npm (Capacitor)
      - name: npm install
        run: npm install

      # 5. Installer le CLI Capacitor globalement
      - name: Installer Capacitor CLI
        run: npm install -g @capacitor/cli

      # 6. Ajouter la plateforme Android
      - name: Ajouter Android
        run: npx cap add android

      # 7. Synchroniser le HTML dans le projet Android
      - name: Synchroniser (cap sync)
        run: npx cap sync android

      # 8. Rendre Gradle exécutable
      - name: Permissions Gradle
        run: chmod +x android/gradlew

      # 9. Compiler le APK debug
      - name: Compiler le APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      # 10. Publier le APK comme artefact téléchargeable
      - name: Publier l'APK
        uses: actions/upload-artifact@v4
        with:
          name: FicheAEP-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
