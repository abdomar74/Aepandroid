name: Build APK Android

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # supprime le warning Node.js

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      # 1. Récupérer le code
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Node.js 22 (LTS stable, compatible Node24 runner)
      - name: Installer Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # 3. Java 17 (requis par Gradle / Android)
      - name: Installer Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 4. Afficher les versions pour diagnostic
      - name: Versions
        run: |
          node --version
          npm --version
          java -version

      # 5. Installer les dépendances (Capacitor + plugins)
      - name: npm install
        run: npm install

      # 6. Installer Capacitor CLI
      - name: Installer Capacitor CLI
        run: npm install -g @capacitor/cli@latest

      # 7. Copier index.html dans www/ (webDir attendu par Capacitor)
      - name: Préparer www/
        run: |
           # mkdir -p www
           # cp index.html www/index.html

      # 8. Ajouter la plateforme Android
      - name: Cap add android
        run: npx cap add android

      # 9. Synchroniser le HTML dans le projet Android
      - name: Cap sync
        run: npx cap sync android

      # 10. Accepter les licences Android SDK
      - name: Accepter licences SDK
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      # 11. Rendre Gradle exécutable
      - name: Permissions Gradle
        run: chmod +x android/gradlew

      # 12. Compiler le APK debug
      - name: Compiler APK
        run: |
          cd android
          ./gradlew assembleDebug \
            --no-daemon \
            --stacktrace \
            -Dorg.gradle.jvmargs="-Xmx2g -XX:+HeapDumpOnOutOfMemoryError"

      # 13. Publier le APK
      - name: Publier APK
        uses: actions/upload-artifact@v4
        with:
          name: FicheAEP-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
